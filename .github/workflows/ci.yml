name: CI

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build:ci
        env:
          NODE_ENV: production
          DATABASE_URL: mysql://placeholder:placeholder@127.0.0.1:3306/car_maintenance
          AUTH_URL: http://localhost:3000
          AUTH_SECRET: ci-placeholder-secret
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          ALLOWED_EMAIL: ci@example.com
