# Apache VirtualHost example for Car Maintenance (Next.js + pm2)
#
# Replace placeholders with scripts/install-apache-vhost.sh, or copy
# deploy/apache-vhost.local.conf.example to deploy/apache-vhost.local.conf
# and edit by hand (local file is gitignored).
#
# <SERVER_NAME> … AUTH_URL のホスト名（例: car.example.com）
# <APP_PORT>     … pm2 待受ポート（1Password port、既定 3104）
#
# phpMyAdmin など Apache 直下の別パスがある場合は、catch-all より上に除外行を書く:
#   ProxyPass <PHPMYADMIN_PATH> !
#   ProxyPassReverse <PHPMYADMIN_PATH> !

<VirtualHost *:80>
    ServerName <SERVER_NAME>

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"

    ProxyPass / http://127.0.0.1:<APP_PORT>/
    ProxyPassReverse / http://127.0.0.1:<APP_PORT>/
</VirtualHost>

<VirtualHost *:443>
    ServerName <SERVER_NAME>

    SSLEngine on
    # certbot 利用時の例（パスは環境に合わせて変更）:
    # SSLCertificateFile /etc/letsencrypt/live/<SERVER_NAME>/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/<SERVER_NAME>/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass / http://127.0.0.1:<APP_PORT>/
    ProxyPassReverse / http://127.0.0.1:<APP_PORT>/
</VirtualHost>
